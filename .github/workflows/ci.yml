name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Create output directory for renderer
        run: mkdir -p tests/output

      - name: Run Tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Run Offline Renderer
        run: ./build/tests/render_wav

      - name: Upload CTest Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ctest-results
          path: build/Testing/**
          if-no-files-found: warn

      - name: Upload Offline Renderer Output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: offline-render-output
          path: tests/output/**
          if-no-files-found: warn