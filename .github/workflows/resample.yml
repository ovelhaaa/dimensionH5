name: Resample WAVs
on:
  workflow_dispatch:

jobs:
  resample:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run resample script
        run: python3 resample.py

      - name: Archive converted WAVs
        uses: actions/upload-artifact@v4
        with:
          name: converted-wavs
          path: samples/*.wav
